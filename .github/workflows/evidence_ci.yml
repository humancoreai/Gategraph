name: GateGraph Evidence CI

on:
  pull_request:
  push:
    branches:
      - main
      - "release/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  evidence-ci:
    name: Windows Evidence CI
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run GateGraph evidence CI
        shell: pwsh
        run: python tests\evidence_ci.py

      - name: Upload evidence logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gategraph-evidence-logs
          path: tests/logs/*.json
          if-no-files-found: warn
